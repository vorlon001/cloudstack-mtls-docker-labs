# =============================================================================
# Конфигурация NGINX для mTLS (Mutual TLS)
# Сервер требует предъявления клиентского сертификата для доступа
#
# Поддерживает два режима:
# 1. Прямой mTLS-доступ (клиент → NGINX) — использует $ssl_client_*
# 2. Проксированный доступ (клиент → прокси → NGINX) — использует X-Client-* заголовки
# =============================================================================

pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------
    # Кастомный формат лога с информацией из клиентского сертификата
    # -----------------------------------------------------------------
    log_format mtls_log '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        'client_dn="$ssl_client_s_dn" '
                        'client_fingerprint="$ssl_client_fingerprint" '
                        'client_serial="$ssl_client_serial" '
                        'client_v_start="$ssl_client_v_start" '
                        'client_v_end="$ssl_client_v_end" '
                        'client_v_remain="$ssl_client_v_remain" '
                        'ssl_protocol="$ssl_protocol" '
                        'ssl_cipher="$ssl_cipher" '
                        'x_client_dn="$http_x_client_dn" '
                        'x_client_serial="$http_x_client_serial" '
                        'x_client_fingerprint="$http_x_client_fingerprint" '
                        'x_client_cert_notbefore="$http_x_client_cert_notbefore" '
                        'x_client_cert_notafter="$http_x_client_cert_notafter" '
                        'x_tls_version="$http_x_tls_version" '
                        'x_tls_cipher="$http_x_tls_cipher" '
                        'x_client_verify="$http_x_client_verify"';

    # Логи выводятся в stdout/stderr для docker logs
    access_log /dev/stdout mtls_log;
    error_log  /dev/stderr;

    server {
        listen 443 ssl;
        server_name localhost;

        # -----------------------------------------------------------------
        # Сертификаты сервера NGINX (предъявляются клиенту)
        # -----------------------------------------------------------------
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # -----------------------------------------------------------------
        # Настройки mTLS: проверка клиентских сертификатов
        # -----------------------------------------------------------------
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       1;

        # -----------------------------------------------------------------
        # Рекомендуемые настройки безопасности TLS
        # -----------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # -----------------------------------------------------------------
        # Маршруты
        # -----------------------------------------------------------------
        location / {
            default_type text/plain;
            # Приоритет: X-Client-DN от прокси > прямой $ssl_client_s_dn
            set $client_dn $ssl_client_s_dn;
            if ($http_x_client_dn != "") {
                set $client_dn $http_x_client_dn;
            }
            return 200 "mTLS Success! Welcome, $client_dn\n";
        }

        # Эндпоинт для проверки статуса (health check)
        location /health {
            default_type application/json;
            set $client_dn $ssl_client_s_dn;
            if ($http_x_client_dn != "") {
                set $client_dn $http_x_client_dn;
            }
            return 200 '{"status":"ok","tls":"mutual","client":"$client_dn"}';
        }

        # Эндпоинт с детальной информацией о клиентском сертификате
        # Поддерживает как прямой mTLS, так и проксированный доступ
        location /cert-info {
            default_type application/json;

            # Приоритет: заголовки от прокси > прямые $ssl_client_*
            set $client_dn $ssl_client_s_dn;
            set $client_fingerprint $ssl_client_fingerprint;
            set $client_serial $ssl_client_serial;
            set $client_v_start $ssl_client_v_start;
            set $client_v_end $ssl_client_v_end;
            set $client_v_remain $ssl_client_v_remain;
            set $tls_protocol $ssl_protocol;
            set $tls_cipher $ssl_cipher;

            if ($http_x_client_dn != "") {
                set $client_dn $http_x_client_dn;
            }
            if ($http_x_client_fingerprint != "") {
                set $client_fingerprint $http_x_client_fingerprint;
            }
            if ($http_x_client_serial != "") {
                set $client_serial $http_x_client_serial;
            }
            if ($http_x_client_cert_notbefore != "") {
                set $client_v_start $http_x_client_cert_notbefore;
            }
            if ($http_x_client_cert_notafter != "") {
                set $client_v_end $http_x_client_cert_notafter;
            }
            if ($http_x_tls_version != "") {
                set $tls_protocol $http_x_tls_version;
            }
            if ($http_x_tls_cipher != "") {
                set $tls_cipher $http_x_tls_cipher;
            }

            return 200 '{"client_dn":"$client_dn","client_fingerprint":"$client_fingerprint","client_serial":"$client_serial","client_v_start":"$client_v_start","client_v_end":"$client_v_end","client_v_remain":"$client_v_remain","ssl_protocol":"$tls_protocol","ssl_cipher":"$tls_cipher"}';
        }
    }
}
