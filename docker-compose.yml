# =============================================================================
# Docker Compose для mTLS: NGINX + Envoy + HAProxy-proxy + NGINX-proxy + клиенты
#
# Запуск всех сервисов:   docker compose up -d --build
# Тесты NGINX:            docker compose run --rm mtls-client-nginx
# Тесты Envoy:            docker compose run --rm mtls-client-envoy
# Тесты HAProxy-proxy:    docker compose run --rm mtls-client-haproxy
# Тесты NGINX-proxy:      docker compose run --rm mtls-client-nginx-proxy
# Остановка:              docker compose down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # NGINX-сервер с mTLS (порт 7443) — backend для всех прокси
  # ---------------------------------------------------------------------------
  nginx-mtls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx-mtls-server
    restart: unless-stopped
    ports:
      - "7443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      mtls-network:
        aliases:
          - nginx-mtls-server
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Envoy Proxy с mTLS (порт 8443, admin 9901)
  # ---------------------------------------------------------------------------
  envoy-mtls:
    build:
      context: ./envoy
      dockerfile: Dockerfile
    container_name: envoy-mtls-server
    restart: unless-stopped
    ports:
      - "18443:8443"
      - "19901:9901"
    volumes:
      - ./certs:/etc/envoy/certs:ro
    networks:
      mtls-network:
        aliases:
          - envoy-mtls-server

  # ---------------------------------------------------------------------------
  # HAProxy как mTLS-прокси перед NGINX (порт 9443, stats 8404)
  # Схема: Клиент --mTLS--> HAProxy:9443 --mTLS--> NGINX:443
  # ---------------------------------------------------------------------------
  haproxy-mtls-proxy:
    build:
      context: ./haproxy
      dockerfile: Dockerfile
    container_name: haproxy-mtls-proxy
    restart: unless-stopped
    ports:
      - "19443:9443"
      - "18404:8404"
    volumes:
      - ./certs:/etc/haproxy/certs:ro
    depends_on:
      nginx-mtls:
        condition: service_healthy
    networks:
      mtls-network:
        aliases:
          - haproxy-mtls-proxy

  # ---------------------------------------------------------------------------
  # NGINX как mTLS-прокси перед NGINX (порт 9444)
  # Схема: Клиент --mTLS--> NGINX-proxy:9444 --mTLS--> NGINX:443
  # ---------------------------------------------------------------------------
  nginx-mtls-proxy:
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    container_name: nginx-mtls-proxy
    restart: unless-stopped
    ports:
      - "19444:9443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx-proxy/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      nginx-mtls:
        condition: service_healthy
    networks:
      mtls-network:
        aliases:
          - nginx-mtls-proxy

  # ---------------------------------------------------------------------------
  # Клиент-тестировщик для NGINX (прямой доступ)
  # ---------------------------------------------------------------------------
  mtls-client-nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mtls-client-nginx
    depends_on:
      nginx-mtls:
        condition: service_healthy
    volumes:
      - ./certs:/certs:ro
    environment:
      - TARGET_SERVER=https://nginx-mtls-server
    networks:
      - mtls-network

  # ---------------------------------------------------------------------------
  # Клиент-тестировщик для Envoy
  # ---------------------------------------------------------------------------
  mtls-client-envoy:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mtls-client-envoy
    depends_on:
      envoy-mtls:
        condition: service_started
    volumes:
      - ./certs:/certs:ro
    environment:
      - TARGET_SERVER=https://envoy-mtls-server:8443
    networks:
      - mtls-network

  # ---------------------------------------------------------------------------
  # Клиент-тестировщик для HAProxy-proxy
  # ---------------------------------------------------------------------------
  mtls-client-haproxy:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mtls-client-haproxy
    depends_on:
      haproxy-mtls-proxy:
        condition: service_started
    volumes:
      - ./certs:/certs:ro
    environment:
      - TARGET_SERVER=https://haproxy-mtls-proxy:9443
    networks:
      - mtls-network

  # ---------------------------------------------------------------------------
  # Клиент-тестировщик для NGINX-proxy
  # ---------------------------------------------------------------------------
  mtls-client-nginx-proxy:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mtls-client-nginx-proxy
    depends_on:
      nginx-mtls-proxy:
        condition: service_started
    volumes:
      - ./certs:/certs:ro
    environment:
      - TARGET_SERVER=https://nginx-mtls-proxy:9443
    networks:
      - mtls-network


  # ---------------------------------------------------------------------------
  # Envoy как mTLS-прокси перед NGINX (порт 9445, admin 9902)
  # Схема: Клиент --mTLS--> Envoy-proxy:9445 --mTLS--> NGINX:443
  # ---------------------------------------------------------------------------
  envoy-mtls-proxy:
    build:
      context: ./envoy-proxy
      dockerfile: Dockerfile
    container_name: envoy-mtls-proxy
    restart: unless-stopped
    ports:
      - "9445:8443"
      - "9902:9901"
    volumes:
      - ./certs:/etc/envoy/certs:ro
    depends_on:
      nginx-mtls:
        condition: service_healthy
    networks:
      mtls-network:
        aliases:
          - envoy-mtls-proxy

networks:
  mtls-network:
    driver: bridge
