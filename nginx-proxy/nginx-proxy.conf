# =============================================================================
# Конфигурация NGINX как mTLS-прокси перед другим NGINX
#
# Схема: Клиент --mTLS--> NGINX-proxy:9443 --mTLS--> NGINX-backend:443
#
# NGINX-proxy терминирует mTLS (проверяет клиентский сертификат),
# затем проксирует запрос на NGINX-backend по mTLS,
# передавая информацию о клиентском сертификате в заголовках.
# =============================================================================

pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------
    # Кастомный формат лога с информацией из клиентского сертификата
    # -----------------------------------------------------------------
    log_format mtls_proxy_log '$remote_addr - [$time_local] "$request" '
                              '$status $body_bytes_sent '
                              'client_dn="$ssl_client_s_dn" '
                              'ssl_protocol="$ssl_protocol" '
                              'ssl_cipher="$ssl_cipher" '
                              'upstream="$upstream_addr" '
                              'upstream_status="$upstream_status"';

    access_log /dev/stdout mtls_proxy_log;
    error_log  /dev/stderr;

    # -----------------------------------------------------------------
    # Upstream: NGINX-backend (mTLS внутри Docker-сети)
    # -----------------------------------------------------------------
    upstream nginx_backend {
        server nginx-mtls-server:443;
    }

    server {
        listen 9443 ssl;
        server_name localhost;

        # -----------------------------------------------------------------
        # Сертификаты сервера NGINX-proxy (предъявляются клиенту)
        # -----------------------------------------------------------------
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # -----------------------------------------------------------------
        # Настройки mTLS: проверка клиентских сертификатов
        # -----------------------------------------------------------------
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       1;

        # -----------------------------------------------------------------
        # Рекомендуемые настройки безопасности TLS
        # -----------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # -----------------------------------------------------------------
        # Маршруты: проксирование на NGINX-backend по mTLS
        # -----------------------------------------------------------------
        location / {
            # Проксируем на NGINX-backend по HTTPS
            proxy_pass https://nginx_backend;

            # Имя для верификации сертификата upstream-сервера
            # Должно совпадать с CN/server_name в сертификате NGINX-backend
            proxy_ssl_name         nginx-mtls-server;

            # NGINX-proxy выступает как mTLS-клиент по отношению к backend
            proxy_ssl_certificate     /etc/nginx/certs/client.crt;
            proxy_ssl_certificate_key /etc/nginx/certs/client.key;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
            proxy_ssl_verify          on;
            proxy_ssl_verify_depth    1;
            proxy_ssl_protocols       TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
            proxy_ssl_session_reuse   on;

            # Передаём информацию о клиентском сертификате в заголовках
            proxy_set_header X-Client-DN            $ssl_client_s_dn;
            proxy_set_header X-Client-Fingerprint    $ssl_client_fingerprint;
            proxy_set_header X-Client-Serial         $ssl_client_serial;
            proxy_set_header X-Client-Cert-NotBefore $ssl_client_v_start;
            proxy_set_header X-Client-Cert-NotAfter  $ssl_client_v_end;
            proxy_set_header X-TLS-Version           $ssl_protocol;
            proxy_set_header X-TLS-Cipher            $ssl_cipher;
            proxy_set_header X-Client-Verify         $ssl_client_verify;

            # Стандартные заголовки проксирования
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Эндпоинт для проверки статуса прокси
        location /proxy-health {
            default_type application/json;
            return 200 '{"status":"ok","proxy":"nginx-mtls-proxy","tls":"mutual","client":"$ssl_client_s_dn"}';
        }
    }
}
